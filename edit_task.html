<!DOCTYPE html>
<html>
<head><title>Edit Task</title></head>
<body>

<h1>Edit Task</h1>

<form method="POST">

    <input name="title" value="{{ task.title }}"><br><br>
    <input name="due" value="{{ task.due }}"><br><br>

    <select name="priority">
        <option {% if task.priority == "High" %}selected{% endif %}>High</option>
        <option {% if task.priority == "Medium" %}selected{% endif %}>Medium</option>
        <option {% if task.priority == "Low" %}selected{% endif %}>Low</option>
    </select><br><br>

    <button>Update</button>

</form>

</body>
</html>
